<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Quadrant Rotation Frame — logo mark concept">
  <title>Rotation Analytics — Quadrant Rotation Frame concept</title>

  <!--
    Concept 3: Quadrant Rotation Frame
    Four L-shaped corner brackets, each a 90° rotation of the last,
    forming a unified analytical frame with a structured open centre.
    Each bracket: arm length 44, arm width 8, corner at 18px from edge.
    The four brackets are geometrically identical — each is the previous
    rotated 90° — embedding rotational symmetry in the structure itself.
    Monochrome navy #1B2D4F. No gradients, no arrows.
  -->

  <!-- Top-left bracket: corner at (18,18) -->
  <rect x="18" y="18" width="44" height="8"  fill="#1B2D4F"/> <!-- horizontal arm →  -->
  <rect x="18" y="18" width="8"  height="44" fill="#1B2D4F"/> <!-- vertical arm ↓    -->

  <!-- Top-right bracket: corner at (182,18) -->
  <rect x="138" y="18" width="44" height="8"  fill="#1B2D4F"/> <!-- horizontal arm ← -->
  <rect x="174" y="18" width="8"  height="44" fill="#1B2D4F"/> <!-- vertical arm ↓   -->

  <!-- Bottom-right bracket: corner at (182,182) -->
  <rect x="138" y="174" width="44" height="8"  fill="#1B2D4F"/> <!-- horizontal arm ← -->
  <rect x="174" y="138" width="8"  height="44" fill="#1B2D4F"/> <!-- vertical arm ↑   -->

  <!-- Bottom-left bracket: corner at (18,182) -->
  <rect x="18" y="174" width="44" height="8"  fill="#1B2D4F"/> <!-- horizontal arm →  -->
  <rect x="18" y="138" width="8"  height="44" fill="#1B2D4F"/> <!-- vertical arm ↑    -->

  <!-- Inner reference square: connects inner tips of all four bracket arms -->
  <!-- Inner tips of H arms: left at x=62, right at x=138; inner tips of V arms: top at y=62, bottom at y=138 -->
  <rect x="62" y="62" width="76" height="76" fill="none" stroke="#1B2D4F" stroke-width="1.5"/>
</svg>
